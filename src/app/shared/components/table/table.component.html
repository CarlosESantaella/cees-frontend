<form>


  <!--begin::Card-->
  <div class="card">
    <!--begin::Card header-->
    <div class="card-header border-0 pt-6">
      <!--begin::Card title-->
      <div class="card-title">
        <!--begin::Search-->
        <div class="d-flex align-items-center position-relative my-1">

          <div class="mb-3 row">
            <div class="col-xs-3 col-sm-auto">
              <!--begin::Svg Icon | path: icons/duotune/general/gen021.svg-->
              <span class="svg-icon svg-icon-1 position-absolute ms-4 mt-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <rect opacity="0.5" x="17.0365" y="15.1223" width="8.15546" height="2" rx="1"
                    transform="rotate(45 17.0365 15.1223)" fill="black"></rect>
                  <path
                    d="M11 19C6.55556 19 3 15.4444 3 11C3 6.55556 6.55556 3 11 3C15.4444 3 19 6.55556 19 11C19 15.4444 15.4444 19 11 19ZM11 5C7.53333 5 5 7.53333 5 11C5 14.4667 7.53333 17 11 17C14.4667 17 17 14.4667 17 11C17 7.53333 14.4667 5 11 5Z"
                    fill="black"></path>
                </svg>
              </span>
              <!--end::Svg Icon-->
              <input id="table-complete-search" type="text" class="form-control form-control-solid w-250px ps-14"
                data-kt-user-table-filter="search" name="searchTerm" placeholder="Buscador"
                [(ngModel)]="service.searchTerm" />
            </div>
            @if (service.loading$ | async) {
            <span class="col col-form-label">Cargando...</span>
            }
          </div>
        </div>
        <!--end::Search-->
      </div>
      <!--begin::Card title-->
      <!--begin::Card toolbar-->
      <div class="card-toolbar">
        <!--begin::Toolbar-->
        <div class="d-flex justify-content-end" data-kt-user-table-toolbar="base">
          <!--begin::Add user-->
          <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#kt_modal_add_user" (click)="actionModal($event, 'create')" *ngIf="actions[0].actions.hasOwnProperty('create')">
            <!--begin::Svg Icon | path: icons/duotune/arrows/arr075.svg-->
            <span class="svg-icon svg-icon-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                <rect opacity="0.5" x="11.364" y="20.364" width="16" height="2" rx="1"
                  transform="rotate(-90 11.364 20.364)" fill="black"></rect>
                <rect x="4.36396" y="11.364" width="16" height="2" rx="1" fill="black"></rect>
              </svg>
            </span>
            <!--end::Svg Icon-->Agregar {{ actions[0].name }}</button>
          <!--end::Add user-->
        </div>
        <!--end::Toolbar-->
        <!--begin::Group actions-->
        <div class="d-flex justify-content-end align-items-center d-none" data-kt-user-table-toolbar="selected">
          <div class="fw-bolder me-5">
            <span class="me-2" data-kt-user-table-select="selected_count"></span>Selected
          </div>
          <button type="button" class="btn btn-danger" data-kt-user-table-select="delete_selected">Delete
            Selected</button>
        </div>
        <!--end::Group actions-->

      </div>
      <!--end::Card toolbar-->
    </div>
    <!--end::Card header-->
    <!--begin::Card body-->
    <div class="card-body pt-0">
      <!--begin::Table-->
      <div id="kt_table_users_wrapper" class="dataTables_wrapper dt-bootstrap4 no-footer">
        <div class="table-responsive hover-scroll-x">
          <table
            class="table align-middle table-striped table-row-dashed table-row-bordered fs-6 gy-5 dataTable no-footer"
            id="kt_table_users">
            <!--begin::Table head-->
            <thead>
              <!--begin::Table row-->
              <tr>
                <th *ngFor="let column of columns" scope="col" class="min-w-125px sorting fw-bold">{{ column.label }}
                </th>
                <th class="min-w-100px sorting_disabled" rowspan="1" colspan="1" aria-label="Actions"
                  style="width: 113.625px;">Acciones</th>
              </tr>
              <!--end::Table row-->
            </thead>
            <!--end::Table head-->
            <!--begin::Table body-->
            <tbody class="text-gray-600 fw-bold">


              @for (record of data$ | async; track record.id) {
              <tr>
                <ng-container *ngFor="let column of columns">

                  <td *ngIf="column.pipe; else plainData">
                    <ngb-highlight [result]="getFormattedValue(record, column.field, column.pipe)"
                      [term]="service.searchTerm" />
                  </td>
                  <ng-template #plainData>
                    <td><ngb-highlight [result]="record[column.field]" [term]="service.searchTerm" /></td>
                  </ng-template>
                </ng-container>
                <td>
                  @if(n_actions != 0){
                    <div ngbDropdown>
                      <button type="button" class="btn btn-light btn-active-light-primary btn-sm" ngbDropdownToggle>Acciones</button>
                      <div ngbDropdownMenu>
                        <a *ngIf="actions[0].actions.hasOwnProperty('edit')" (click)="actionModal($event, 'edit', record.id)"  ngbDropdownItem>Editar</a>
                        <a *ngIf="actions[0].actions.hasOwnProperty('delete')" (click)="actionModal($event, 'delete', record.id)"  ngbDropdownItem>Delete</a>
                      </div>
                    </div>
                  }
                </td>
              </tr>
              } @empty {
              <tr>
                <td colspan="4" style="text-align: center">No data found</td>
              </tr>
              }
            </tbody>
            <!--end::Table body-->
          </table>
        </div>
        <div class="d-flex justify-content-between p-2">
          <ngb-pagination [collectionSize]="(total$ | async)!" [(page)]="service.page" [pageSize]="service.pageSize"
            [maxSize]="3" [rotate]="true" [boundaryLinks]="true">
          </ngb-pagination>
        </div>
      </div>
      <!--end::Table-->
    </div>
    <!--end::Card body-->
  </div>
  <!--end::Card-->
</form>
